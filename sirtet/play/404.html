<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sirtet - Challenge Redirect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // Redirect path-based challenge URLs to hash-based format
        // This handles the case when the native app is not installed
        // and the user clicks a shared challenge link from the web

        (function() {
            // Get the current location
            const location = window.location;

            // Check if this is a challenge URL path
            if (location.pathname.includes('/sirtet/challenge')) {
                // Extract the query string (e.g., "state=ABC123&colors=5")
                const queryString = location.search.substring(1); // Remove leading '?'

                // Build the new hash-based URL
                let newUrl = '/sirtet/play/#/challenge';
                if (queryString) {
                    newUrl += '?' + queryString;
                }

                // Redirect to the hash-based URL
                window.location.replace(newUrl);
            } else if (location.pathname.startsWith('/sirtet/')) {
                // Other Sirtet paths, redirect to web app home
                window.location.replace('/sirtet/play/');
            }
            // Non-Sirtet paths: do nothing (show 404 page)
        })();
    </script>
</head>
<body>
    <p>Redirecting to Sirtet...</p>
</body>
</html>
