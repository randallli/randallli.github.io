<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sirtet has moved</title>
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://playsirtet.com/play/">
  <script>
    (function () {
      // Strip the legacy /sirtet/play prefix from the path. Anchored on
      // either '/' or end-of-string so a sibling path like
      // /sirtet/playground is left alone.
      // /sirtet/play/foo/bar  →  /foo/bar
      // /sirtet/play          →  ''
      // /sirtet/play/         →  /
      var path = location.pathname.replace(/^\/sirtet\/play(?=\/|$)/, '');

      // Hash routing legacy form: /sirtet/play/#/challenge?state=X
      // location.hash starts with '#'. If it begins with '#/', treat
      // everything after '#' as a path+query that should be promoted.
      var hash = location.hash;            // e.g. "#/challenge?state=ABC" or ""
      var search = location.search;        // e.g. "?seed=0x3039&colors=5" or ""

      var target = 'https://playsirtet.com/play';

      if (hash.indexOf('#/') === 0) {
        // Promote hash route to a real path. Hash already includes its own
        // query string if any; we append it AFTER the path-side query so the
        // hash params win on duplicate keys (matches old SPA precedence).
        var promoted = hash.slice(1);                      // "/challenge?state=ABC"
        var qIdx = promoted.indexOf('?');
        var hashPath  = qIdx === -1 ? promoted : promoted.slice(0, qIdx);
        var hashQuery = qIdx === -1 ? ''       : promoted.slice(qIdx);     // includes leading '?'

        target += hashPath || path || '/';

        if (search && hashQuery) {
          // Merge: keep both, hash wins on conflict (server-side dedup not possible)
          target += search + '&' + hashQuery.slice(1);
        } else {
          target += search || hashQuery;
        }
      } else {
        // No hash route — straight path + query forward
        target += (path || '/') + search + hash;
      }

      // Use replace() so the legacy URL is not in browser history
      location.replace(target);
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=https://playsirtet.com/play/">
</head>
<body>
  <p>Sirtet has moved to <a href="https://playsirtet.com/play/">playsirtet.com/play</a>.</p>
</body>
</html>
